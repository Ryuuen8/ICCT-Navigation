{% load static %}
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link rel="stylesheet" href="{% static "css/floor-maps.css" %}">
    </head>
    <body>
        <div class="fm-app">
            <div class="fm-card">
                <!-- Header: Select Destination -->
                <div class="fm-header">
                    <h2>
                        <a href="{% url "main" %}" style="text-decoration: none;">
                            <i class="fa-solid fa-angle-left"></i>
                        </a>
                        <i class="fas fa-location-dot"></i>
                        Select Destination
                    </h2>
                </div>
                <!-- Search Row -->
                <div class="fm-search-row">
                    <div class="fm-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text"
                               id="fmSearchInput"
                               placeholder="Search for a room, lab or area..."
                               autocomplete="off">
                    </div>
                </div>
                <!-- Filter Tabs: All, Rooms, Labs, Areas -->
                <div class="fm-filter-tabs" id="fmFilterTabs">
                    <button class="fm-filter-btn active" data-filter="all">All</button>
                    <button class="fm-filter-btn" data-filter="Rooms">Rooms</button>
                    <button class="fm-filter-btn" data-filter="Labs">Labs</button>
                    <button class="fm-filter-btn" data-filter="Areas">Areas</button>
                </div>
                <!-- Destination List - Django integration point -->
                <div class="fm-destination-list" id="fmDestinationList">
                    <ul class="fm-dest-list-ul">
                        {% for name in room_name %}
                            <li class="fm-dest-item" data-name="{{ name }}">
                                <div class="fm-dest-info">
                                    <div class="fm-dest-name">
                                        <i class="fas fa-door-open"></i>
                                        <span>{{ name }}</span>
                                    </div>
                                    <div class="fm-dest-floor">
                                        <i class="fas fa-layer-group"></i>
                                        <span class="fm-floor-text">Floor information</span>
                                    </div>
                                </div>
                                <div class="fm-direction-icon">
                                    <i class="fas fa-chevron-right"></i>
                                </div>
                            </li>
                        {% empty %}
                            <li class="fm-empty-state">
                                <i class="fas fa-building"></i>
                                <span>No destinations available</span>
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </body>
</html>
