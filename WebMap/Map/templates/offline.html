{% load static pwa %}
<!DOCTYPE html>
<html lang="en">
    <head>
        {% progressive_web_app_meta %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Offline - ICCT Navigation</title>
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f5f7fb;
                font-family: Arial, sans-serif;
                padding: 24px;
            }

            .offline-card {
                max-width: 420px;
                width: 100%;
                background: #fff;
                border-radius: 20px;
                padding: 32px 24px;
                text-align: center;
                box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
            }

            .offline-card h1 {
                margin: 0 0 12px;
                font-size: 1.5rem;
                color: #1a1a2e;
            }

            .offline-card p {
                margin: 0 0 24px;
                color: #555;
                line-height: 1.5;
            }

            .offline-links {
                display: grid;
                gap: 10px;
            }

            .offline-links a {
                display: block;
                padding: 12px 16px;
                border-radius: 12px;
                background: #1565c0;
                color: #fff;
                text-decoration: none;
                font-weight: 600;
            }

            .offline-links a.secondary {
                background: #eceff4;
                color: #1a1a2e;
            }
        </style>
    </head>
    <body>
        <div class="offline-card">
            <h1>You are offline</h1>
            <p>
                Cached pages are still available. Open Home, Map, or Emergency to continue
                using the app without a connection.
            </p>
            <div class="offline-links">
                <a href="{% url 'main' %}">Go to Home</a>
                <a href="{% url 'mainmap' %}">Open Map</a>
                <a href="{% url 'emergency' %}" class="secondary">Emergency Guide</a>
            </div>
        </div>
    </body>
</html>
