{% extends "admin/base_site.html" %}
{% load static %}
{% block extrastyle %}
    <!-- =========================
     LEAFLET (USE STABLE 1.9.4)
========================= -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- =========================
     LEAFLET DRAW
========================= -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <!-- =========================
     FONT AWESOME (optional UI)
========================= -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="{% static "js/script.js" %}"></script>
    <style>
        #map {
            width: 100%;
            height: calc(100vh - 140px);
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e5e7eb;
        }

        .map-wrapper {
            padding: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .toolbar button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .toolbar button:hover {
            background: #1d4ed8;
        }

        .floor-container {
            position: absolute;
            left: 0;
            top: 25%;
            transform: translateY(-25%);
            z-index: 1000;
        }

        /* FIXED: keep container as anchor only */
        .fmenu-container {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);

            display: flex;
            flex-direction: column;
            /* important for dropdown stacking */
            align-items: flex-start;

            gap: 10px;

            z-index: 1001;
        }

        /* BUTTON */
        .floors-box {
            all: unset;

            width: clamp(46px, 12vw, 78px);
            height: clamp(46px, 12vw, 78px);

            background: white;
            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: clamp(14px, 2vw, 22px);

            cursor: pointer;
            user-select: none;

            font-size: clamp(12px, 4vw, 20px);
            font-family: 'Courier New', Courier, monospace;
            width: fit-content;
            box-shadow: 0 clamp(2px, 0.6vw, 6px) clamp(6px, 1.5vw, 14px) rgba(0, 0, 0, 0.12);

            transition: 0.15s ease;
        }

        .floor-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;

            background: white;
            border-radius: 14px;
            padding: 8px;

            display: flex;
            flex-direction: column;
            gap: 6px;

            width: fit-content;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);

            opacity: 0;
            transform: translateY(-8px) scale(0.98);
            pointer-events: none;

            transition: 0.15s ease;
        }

        .floor-menu.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .floor-item {
            all: unset;
            padding: 10px 12px;
            border-radius: 10px;

            cursor: pointer;

            font-family: Arial, sans-serif;
            font-size: 14px;

            transition: 0.15s ease;
        }

        .floor-item:hover {
            background: #f2f2f2;
        }
    </style>
{% endblock %}
{% block content %}
    <div class="map-wrapper">
        <h1>Indoor Navigation Map Editor</h1>
        <div id="map"></div>
        {{ path|json_script:"path-data" }}
        {{ locations|json_script:"locations-data" }}
        <div class="toolbar">
            <button onclick="saveRooms()">Save Room</button>
        </div>
    </div>
    <!-- =========================
     SCRIPTS (IMPORTANT ORDER)
========================= -->
    <!-- Leaflet FIRST -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- AntPath (if you use paths elsewhere) -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
    <!-- Leaflet Draw (AFTER Leaflet) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Your map logic -->
    <script src="{% static 'admin/admin-map.js' %}"></script>
    <!-- CSRF helper -->
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
    <div class="floor-container">
        <div class="fmenu-container">
            <button class="floors-box"
                    id="floorBtn"
                    aria-expanded="false"
                    aria-controls="floorMenu">
                <span class="floors">Floors</span>
            </button>
            <div class="floor-menu" id="floorMenu">
                <button class="floor-item" data-floor="1">F1</button>
                <button class="floor-item" data-floor="2">F2</button>
                <button class="floor-item" data-floor="3">F3</button>
                <button class="floor-item" data-floor="4">F4</button>
                <button class="floor-item" data-floor="5">F5</button>
            </div>
        </div>
    </div>
{% endblock %}
