{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCT Admin — Map Editor</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        /* VARIABLES */
        :root {
            --navy: #04145d;
            --navy-mid: #1f3a8a;
            --navy-light: rgba(4, 20, 93, .08);
            --orange: #ea580c;
            --orange-light: rgba(234, 88, 12, .1);
            --bg: #f0f2f8;
            --surface: #fff;
            --border: rgba(4, 20, 93, .1);
            --text: #1e293b;
            --success: #0d8a4b;
        }

        /* BODY */
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: var(--navy);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform .3s ease;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-brand {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            color: #fff;
        }

        .sidebar-nav {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .nav-item {
            color: rgba(255, 255, 255, .75);
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: .85rem;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .menu-btn {
            display: none;
            font-size: 1.2rem;
            background: none;
            border: none;
            color: var(--navy);
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: .8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-ghost {
            background: var(--navy-light);
            color: var(--navy)
        }

        .btn-success {
            background: var(--success);
            color: #fff
        }

        .btn-orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .btn-orange.active {
            background: var(--orange);
            color: #fff
        }

        /* CONTENT */
        .content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* MAP CARD */
        .map-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .map-card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .floor-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .floor-item {
            border: none;
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: .75rem;
            cursor: pointer;
            background: var(--navy-light);
        }

        .floor-item.active {
            background: var(--navy);
            color: #fff;
        }

        /* MAP */
        #map {
            flex: 1;
            min-height: 300px;
        }

        /* FLOOR BADGE */
        .floor-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--navy);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: .75rem;
            z-index: 1000;
        }

        /* MOBILE */
        @media(max-width:900px) {
            .main {
                margin-left: 0
            }

            .menu-btn {
                display: block
            }

            .sidebar {
                transform: translateX(-100%)
            }

            .sidebar.show {
                transform: translateX(0)
            }
        }

        @media(max-width:500px) {
            .topbar-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h1>ICCT CAINTA</h1>
            <span>Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="#"><i class="fa fa-gauge"></i>Dashboard</a>
            <a class="nav-item active" href="#"><i class="fa fa-draw-polygon"></i>Map Editor</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fa fa-bars"></i>
            </button>

            <strong>Indoor Map Editor</strong>

            <div class="topbar-actions">
                <button class="btn btn-ghost">Load</button>
                <button class="btn btn-success">Save</button>
                <button class="btn btn-orange" id="addNodeBtn">Add Node</button>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="map-card">
                <div class="map-card-header">
                    <h3>Floor View</h3>
                    <div class="floor-pills">
                        <button class="floor-item active">F1</button>
                        <button class="floor-item">F2</button>
                        <button class="floor-item">F3</button>
                    </div>
                </div>

                <div style="position:relative;flex:1">
                    <div class="floor-badge">Floor 1</div>
                    <div id="map"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show')
        }
    </script>

</body>

</html>
