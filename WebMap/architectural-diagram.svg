
<svg width="1600" height="1100"
     xmlns="http://www.w3.org/2000/svg">

<style>
.title{font:700 32px Arial;}
.subtitle{font:700 22px Arial;}
.layerTitle{font:700 22px Arial; fill:white;}
.header{font:700 16px Arial;}
.body{font:14px Arial;}
.box{
stroke:#333;
stroke-width:2;
rx:10;
}
</style>

<!-- TITLE -->

<text x="800" y="50"
      text-anchor="middle"
      class="title">
ARCHITECTURE DIAGRAM
</text>

<text x="800" y="90"
